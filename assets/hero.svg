<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">David x3d GitHub profile banner</title>
  <desc id="desc">A dark glass-style developer banner for David, focused on CLI tools, terminal utilities, and KDE Plasma customization.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#030712"/>
      <stop offset="0.46" stop-color="#08111F"/>
      <stop offset="1" stop-color="#150B2E"/>
    </linearGradient>
    <radialGradient id="cyanGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(210 74) rotate(36) scale(510 265)">
      <stop stop-color="#67E8F9" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#67E8F9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="purpleGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1010 328) rotate(154) scale(480 250)">
      <stop stop-color="#C084FC" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#C084FC" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="70" y1="54" x2="1130" y2="366" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.055"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.13"/>
    </linearGradient>
    <linearGradient id="edge" x1="70" y1="54" x2="1130" y2="366" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A5F3FC" stop-opacity="0.9"/>
      <stop offset="0.55" stop-color="#FFFFFF" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#D8B4FE" stop-opacity="0.78"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" stroke="#FFFFFF" stroke-opacity="0.055"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="30" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <style>
      .eyebrow { fill: #8be9fd; font: 800 16px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; letter-spacing: 4px; }
      .title { fill: #f8fafc; font: 900 82px Inter, Segoe UI, Arial, sans-serif; letter-spacing: -4px; }
      .subtitle { fill: #cbd5e1; font: 600 25px Inter, Segoe UI, Arial, sans-serif; }
      .body { fill: #94a3b8; font: 500 18px Inter, Segoe UI, Arial, sans-serif; }
      .mono { fill: #dbeafe; font: 600 18px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
      .muted { fill: #94a3b8; font: 500 15px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
      .chip { fill: #e0f2fe; font: 800 14px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    </style>
  </defs>

  <rect width="1200" height="420" rx="36" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="36" fill="url(#grid)"/>
  <rect width="1200" height="420" rx="36" fill="url(#cyanGlow)"/>
  <rect width="1200" height="420" rx="36" fill="url(#purpleGlow)"/>

  <g opacity="0.62">
    <circle cx="107" cy="88" r="3" fill="#A5F3FC"/>
    <circle cx="197" cy="321" r="2.5" fill="#C084FC"/>
    <circle cx="1042" cy="83" r="3" fill="#A5F3FC"/>
    <circle cx="1111" cy="278" r="2.5" fill="#D8B4FE"/>
    <circle cx="710" cy="57" r="2" fill="#67E8F9"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="64" y="54" width="1072" height="312" rx="32" fill="url(#glass)"/>
    <rect x="64.5" y="54.5" width="1071" height="311" rx="31.5" stroke="url(#edge)" stroke-opacity="0.62"/>
  </g>

  <g transform="translate(96 95)">
    <text class="eyebrow" x="0" y="0">GITHUB.COM/DAVID-X3D</text>
    <text class="title" x="0" y="88">David</text>
    <text class="subtitle" x="4" y="134">Terminal tools, clean UX, Linux customization.</text>
    <text class="body" x="4" y="173">Practical software with clean defaults and no extra noise.</text>

    <g transform="translate(4 210)">
      <rect x="0" y="0" width="118" height="36" rx="18" fill="#0EA5E9" fill-opacity="0.18" stroke="#7DD3FC" stroke-opacity="0.52"/>
      <text class="chip" x="32" y="23">Tools</text>

      <rect x="136" y="0" width="82" height="36" rx="18" fill="#22C55E" fill-opacity="0.14" stroke="#86EFAC" stroke-opacity="0.48"/>
      <text class="chip" x="160" y="23">CLI</text>

      <rect x="236" y="0" width="104" height="36" rx="18" fill="#A855F7" fill-opacity="0.16" stroke="#D8B4FE" stroke-opacity="0.5"/>
      <text class="chip" x="258" y="23">local-first</text>

      <rect x="358" y="0" width="128" height="36" rx="18" fill="#F59E0B" fill-opacity="0.15" stroke="#FCD34D" stroke-opacity="0.5"/>
      <text class="chip" x="382" y="23">KDE Plasma</text>
    </g>
  </g>

  <g transform="translate(760 86)">
    <rect x="0" y="0" width="322" height="232" rx="22" fill="#020617" fill-opacity="0.82" stroke="#67E8F9" stroke-opacity="0.28"/>
    <circle cx="31" cy="30" r="6" fill="#FB7185"/>
    <circle cx="53" cy="30" r="6" fill="#FBBF24"/>
    <circle cx="75" cy="30" r="6" fill="#34D399"/>

    <text class="muted" x="28" y="76">$ profile --projects</text>
    <text class="mono" x="28" y="106">terminal-shot</text>
    <text class="mono" x="28" y="135">qrawisp</text>
    <text class="mono" x="28" y="164">ios-cert-checker</text>
    <text class="mono" x="28" y="193">works-on-my-machine</text>

    <rect x="236" y="64" width="50" height="22" rx="11" fill="#67E8F9" fill-opacity="0.14"/>
    <text class="muted" x="250" y="80">DE</text>
    <rect x="224" y="174" width="72" height="22" rx="11" fill="#C084FC" fill-opacity="0.14"/>
    <text class="muted" x="239" y="190">NRW</text>
  </g>

  <path d="M92 356C224 316 313 379 435 336C541 298 588 326 703 348C835 373 940 321 1108 349" stroke="#67E8F9" stroke-opacity="0.34" stroke-width="2"/>
  <path d="M92 362C221 337 331 362 449 353C581 343 660 372 777 358C907 342 991 333 1108 360" stroke="#C084FC" stroke-opacity="0.28" stroke-width="2"/>
</svg>
