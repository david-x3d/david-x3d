<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">David x3d profile banner</title>
  <desc id="desc">A dark glass-style developer banner for David x3d, focused on TypeScript, React, Linux, KDE, and local-first tools.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07111F"/>
      <stop offset="0.45" stop-color="#0A1020"/>
      <stop offset="1" stop-color="#120A24"/>
    </linearGradient>
    <radialGradient id="cyanGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(248 90) rotate(32) scale(430 210)">
      <stop stop-color="#69E1FF" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#69E1FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violetGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1020 260) rotate(151) scale(430 240)">
      <stop stop-color="#9B5CFF" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#9B5CFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="70" y1="42" x2="1130" y2="318" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="0.52" stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.11"/>
    </linearGradient>
    <linearGradient id="stroke" x1="66" y1="41" x2="1130" y2="319" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A5F3FC" stop-opacity="0.8"/>
      <stop offset="0.48" stop-color="#FFFFFF" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#C084FC" stop-opacity="0.7"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" stroke="#FFFFFF" stroke-opacity="0.055"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <style>
      .eyebrow { fill: #8be9fd; font: 700 16px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; letter-spacing: 4px; }
      .title { fill: #f8fafc; font: 900 72px Inter, Segoe UI, Arial, sans-serif; letter-spacing: -3px; }
      .subtitle { fill: #cbd5e1; font: 500 24px Inter, Segoe UI, Arial, sans-serif; }
      .mono { fill: #dbeafe; font: 500 18px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
      .muted { fill: #94a3b8; font: 500 15px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
      .chip { fill: #e0f2fe; font: 700 14px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    </style>
  </defs>

  <rect width="1200" height="360" rx="34" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="34" fill="url(#grid)"/>
  <rect width="1200" height="360" rx="34" fill="url(#cyanGlow)"/>
  <rect width="1200" height="360" rx="34" fill="url(#violetGlow)"/>

  <g filter="url(#softShadow)">
    <rect x="62" y="42" width="1076" height="276" rx="28" fill="url(#glass)"/>
    <rect x="62.5" y="42.5" width="1075" height="275" rx="27.5" stroke="url(#stroke)" stroke-opacity="0.55"/>
  </g>

  <g transform="translate(94 82)">
    <text class="eyebrow" x="0" y="0">GITHUB.COM/DAVID-X3D</text>
    <text class="title" x="0" y="78">David x3d</text>
    <text class="subtitle" x="4" y="124">TypeScript tools, React interfaces, Linux customization.</text>

    <g transform="translate(4 164)">
      <rect x="0" y="0" width="128" height="34" rx="17" fill="#0ea5e9" fill-opacity="0.18" stroke="#7dd3fc" stroke-opacity="0.5"/>
      <text class="chip" x="20" y="22">terminal-shot</text>

      <rect x="146" y="0" width="88" height="34" rx="17" fill="#22c55e" fill-opacity="0.14" stroke="#86efac" stroke-opacity="0.45"/>
      <text class="chip" x="168" y="22">qrawisp</text>

      <rect x="252" y="0" width="152" height="34" rx="17" fill="#a855f7" fill-opacity="0.16" stroke="#d8b4fe" stroke-opacity="0.45"/>
      <text class="chip" x="274" y="22">ios-cert-checker</text>

      <rect x="422" y="0" width="112" height="34" rx="17" fill="#f59e0b" fill-opacity="0.14" stroke="#fcd34d" stroke-opacity="0.45"/>
      <text class="chip" x="446" y="22">KDE Plasma</text>
    </g>
  </g>

  <g transform="translate(760 74)">
    <rect x="0" y="0" width="310" height="206" rx="20" fill="#020617" fill-opacity="0.76" stroke="#67e8f9" stroke-opacity="0.28"/>
    <circle cx="30" cy="28" r="6" fill="#fb7185"/>
    <circle cx="52" cy="28" r="6" fill="#fbbf24"/>
    <circle cx="74" cy="28" r="6" fill="#34d399"/>

    <text class="muted" x="28" y="72">$ whoami</text>
    <text class="mono" x="28" y="102">developer from Germany</text>
    <text class="muted" x="28" y="138">$ focus --today</text>
    <text class="mono" x="28" y="168">local-first workflows</text>
  </g>

  <path d="M92 314C223 274 312 337 432 294C537 256 586 284 700 306C830 331 936 279 1108 307" stroke="#67E8F9" stroke-opacity="0.34" stroke-width="2"/>
  <path d="M92 318C221 295 329 320 446 311C577 301 658 330 774 316C904 300 991 291 1108 318" stroke="#C084FC" stroke-opacity="0.28" stroke-width="2"/>
</svg>
